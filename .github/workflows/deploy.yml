name: Build and deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # for .Lastmod via git if enableGitInfo is on

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enable Pages (GitHub Actions source) on first run

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        # baseURL comes from config/_default/hugo.toml (the custom domain),
        # NOT from configure-pages — which can resolve to the github.io
        # project path before the custom domain is registered, breaking
        # asset/canonical/sitemap URLs at the domain root.
        run: hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Notify Bing (and other IndexNow engines) to crawl immediately, instead
      # of waiting for the slow new-domain crawl cycle. The key is published as
      # a static file at the keyLocation below; IndexNow verifies it before
      # accepting the submission. Public by design — safe to commit.
      - name: Ping IndexNow
        env:
          INDEXNOW_KEY: aa46852bf2995c1edac9c4badf8503a7
          SITE_HOST: mesmerdesignshop.com
        run: |
          # Give the new deploy a moment to go live so submitted URLs return 200.
          sleep 30
          python3 - <<'PY'
          import json, os, re, urllib.request

          host = os.environ["SITE_HOST"]
          key  = os.environ["INDEXNOW_KEY"]
          base = f"https://{host}"

          sitemap = urllib.request.urlopen(f"{base}/sitemap.xml", timeout=30).read().decode()
          urls = re.findall(r"<loc>(.*?)</loc>", sitemap)
          urls = [u for u in urls if u.startswith(base)][:10000]
          print(f"Submitting {len(urls)} URLs to IndexNow")

          payload = json.dumps({
              "host": host,
              "key": key,
              "keyLocation": f"{base}/{key}.txt",
              "urlList": urls,
          }).encode()

          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=payload,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(f"IndexNow responded: {resp.status} {resp.reason}")
          PY
