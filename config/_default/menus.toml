# ── Primary nav ──────────────────────────────────────────────────────────
# Top level stays lean: "Gift Guides" opens a grouped mega-menu (its children
# below), then a couple of flagship links + the Etsy CTA (added in the header
# template). To add a new category later: add one [[main]] entry with
# parent = "gift-guides" and a `group` param — no template changes needed.
[[main]]
  identifier = "gift-guides"
  name = "Gift Guides"
  pageRef = "/blog"
  weight = 10

# Mega-menu children, grouped by the `group` param (column order = weight order)
