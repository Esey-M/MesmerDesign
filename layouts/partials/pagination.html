{{- $p := .Paginator -}}
{{- if gt $p.TotalPages 1 -}}
<nav class="pagination" aria-label="Pagination">
  {{- if $p.HasPrev }}<a href="{{ $p.Prev.URL }}" rel="prev">← Prev</a>{{ end -}}
  {{- range $p.Pagers -}}
    {{- if eq . $p }}<span class="active" aria-current="page">{{ .PageNumber }}</span>
    {{- else }}<a href="{{ .URL }}">{{ .PageNumber }}</a>{{ end -}}
  {{- end -}}
  {{- if $p.HasNext }}<a href="{{ $p.Next.URL }}" rel="next">Next →</a>{{ end -}}
</nav>
{{- end -}}
